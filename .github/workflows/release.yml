name: Release

# Windows- und macOS-Release bei Versions-Tag: baut NSIS-Installer (Windows)
# bzw. ein universelles, unsigniertes App-/DMG-Bundle (macOS), signiert die
# Update-Artefakte (TAURI_SIGNING_PRIVATE_KEY aus den Repo-Secrets) und
# veröffentlicht GitHub Release inkl. latest.json für den In-App-Updater.
# Beide Runner veröffentlichen auf dasselbe Tag-Release; tauri-action merged
# die Plattform-Einträge in der latest.json automatisch zusammen.
#
# macOS-Build ist bewusst unsigniert (kein Apple-Zertifikat/Notarization) —
# siehe Gatekeeper-Hinweis in README.md / docs/ANLEITUNG.md.
#
# Auslösen: Version in apps/lua/src-tauri/tauri.conf.json + Cargo.toml erhöhen,
# committen, dann:  git tag v1.0.1 && git push origin v1.0.1

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: ${{ matrix.name }} bauen & veröffentlichen
    strategy:
      fail-fast: false
      # Beide Plattformen aktualisieren dasselbe GitHub-Release und dieselbe
      # latest.json. Nacheinander verhindert, dass tauri-action parallel
      # dasselbe Release anlegt oder seine Assets überschreibt.
      max-parallel: 1
      matrix:
        include:
          - os: windows-latest
            name: Windows-Installer
            # nur NSIS: MSI (WiX) kann nicht patchen/updaten wie NSIS und
            # verdoppelt Build-Zeit; Erstinstallation + Updates laufen über NSIS.
            args: --bundles nsis
            rustTargets: ""
          - os: macos-latest
            name: macOS-Bundle (universal, unsigniert)
            # Universal-Binary für Intel- und Apple-Silicon-Macs in einem Bundle.
            args: --target universal-apple-darwin
            rustTargets: aarch64-apple-darwin,x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: apps/lua
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/lua/pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/lua/src-tauri

      - run: pnpm install --frozen-lockfile

      # Workspace-Pakete bauen (dist/*.d.ts, gitignored) — gleiche Begründung
      # wie in ci.yml: frische CI-Umgebung braucht die Cross-Paket-Typen.
      - run: pnpm --filter "./packages/*" build

      - name: NATASCHA-Sidecar für Windows bauen
        if: runner.os == 'Windows'
        working-directory: apps/natascha
        shell: pwsh
        run: .\build_sidecar.ps1

      - name: NATASCHA-Sidecar für macOS bauen
        if: runner.os == 'macOS'
        working-directory: apps/natascha
        run: bash ./build_sidecar.sh

      - name: NATASCHA-Sidecar auf Runde-7-Flags prüfen (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/natascha
        shell: pwsh
        run: |
          $help = & .\dist\natascha-cli\natascha-cli-x86_64-pc-windows-msvc.exe analyze --help | Out-String
          if ($help -notmatch '--einsatz-id' -or $help -notmatch '--material-id') {
            throw 'Sidecar ist veraltet: Einsatz-/Material-Flags fehlen.'
          }

      - name: NATASCHA-Sidecar auf Runde-7-Flags prüfen (macOS)
        if: runner.os == 'macOS'
        working-directory: apps/natascha
        run: |
          help="$(./dist/natascha-cli/natascha-cli-universal-apple-darwin analyze --help)"
          grep -q -- '--einsatz-id' <<< "$help"
          grep -q -- '--material-id' <<< "$help"

      # Release-Notes aus dem obersten CHANGELOG-Abschnitt (zwischen der
      # ersten und zweiten "## "-Überschrift) für den In-App-Update-Dialog.
      # Läuft im Repo-Root (working-directory-Override), da CHANGELOG.md dort
      # liegt, nicht unter apps/lua. Fallback bei leerem/fehlendem Abschnitt:
      # "Details im CHANGELOG." (siehe extract-release-notes.mjs).
      - name: Release-Notes aus CHANGELOG.md extrahieren
        id: release_notes
        working-directory: .
        run: node .github/scripts/extract-release-notes.mjs

      # Gate: Die Tauri-Bundler-Namensauflösung wird gegen das fertige Paket
      # geprüft, bevor tauri-action den Release veröffentlicht. So kann ein
      # grüner Sidecar-Build keinen defekten Installer mehr überdecken.
      - name: Installierten Windows-Sidecar-Smoke ausführen
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pnpm tauri build --bundles nsis --config src-tauri/tauri.natascha-sidecar.conf.json
          $installer = Get-ChildItem -LiteralPath 'src-tauri/target/release/bundle/nsis' -Filter '*.exe' |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) { throw 'Kein NSIS-Installer für den Sidecar-Smoke gefunden.' }
          $installDir = Join-Path $env:RUNNER_TEMP "luka-sidecar-smoke-$env:GITHUB_RUN_ID"
          pwsh -File '../../scripts/verify-sidecar-installer.ps1' -InstallerPath $installer.FullName -InstallDirectory $installDir

      - name: Installierten macOS-Sidecar-Smoke ausführen
        if: runner.os == 'macOS'
        run: |
          pnpm tauri build --target universal-apple-darwin --config src-tauri/tauri.natascha-sidecar.conf.json
          app="$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$app"
          sidecar="$(find "$app/Contents" -type f -name 'natascha-cli' -print -quit)"
          test -n "$sidecar"
          test -x "$sidecar"
          help="$($sidecar analyze --help)"
          grep -q -- '--einsatz-id' <<< "$help"
          grep -q -- '--material-id' <<< "$help"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          projectPath: apps/lua
          tagName: ${{ github.ref_name }}
          releaseName: "Luka ${{ github.ref_name }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          # Windows: nur NSIS (siehe Kommentar oben in der Matrix).
          # macOS: universelles App-/DMG-Bundle, unsigniert.
          args: ${{ matrix.args }} --config src-tauri/tauri.natascha-sidecar.conf.json
