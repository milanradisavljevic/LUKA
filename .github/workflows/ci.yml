name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: LUA — typecheck & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/lua
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/lua/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Workspace-Pakete bauen → liefert dist/*.d.ts (gitignored), das die
      # Cross-Paket-Typen für typecheck/test in frischer CI-Umgebung auflöst.
      - run: pnpm --filter "./packages/*" build
      - run: pnpm -r typecheck
      - run: pnpm -r test

  natascha:
    name: NATASCHA — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/natascha
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # cli + tui Requirements: test_tui.py importiert das TUI-Modul (textual).
      - run: pip install -r requirements_cli.txt -r requirements_tui.txt pytest
      - run: pytest -q
