name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    name: Änderungen erkennen
    runs-on: ubuntu-latest
    outputs:
      natascha: ${{ steps.filter.outputs.natascha }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            natascha:
              - 'apps/natascha/**'

  web:
    name: LUA — typecheck & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/lua
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/lua/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Workspace-Pakete bauen → liefert dist/*.d.ts (gitignored), das die
      # Cross-Paket-Typen für typecheck/test in frischer CI-Umgebung auflöst.
      - run: pnpm --filter "./packages/*" build
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - name: pnpm audit (report only)
        run: pnpm audit --prod || true

  rust:
    name: LUA Tauri — cargo check & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/lua/src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/lua/pnpm-lock.yaml
      - name: Build Tauri frontendDist
        working-directory: apps/lua
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter "./packages/*" build
          pnpm --filter @lehrunterlagen/web build
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/lua/src-tauri
      # Fehlertext als Annotation ausgeben — Annotations sind auch ohne
      # Repo-Admin-Rechte über die API lesbar (Log-Download ist es nicht).
      - name: cargo check
        env:
          # Incremental bringt in CI nichts und verdoppelt das target-Verzeichnis —
          # Verdacht: Runner-Platte läuft voll (Log bricht mitten im Stream ab).
          CARGO_INCREMENTAL: "0"
        run: |
          set -o pipefail
          # -j 2: Log bricht mitten im Stream ab, Platte ist frei (87 GB) →
          # OOM-Kill der parallelen rustc-Prozesse. Weniger Jobs = weniger RAM.
          cargo check -j 2 2>&1 | tee /tmp/cargo-check.log || {
            echo "::error title=oom-b64::$(sudo dmesg 2>/dev/null | grep -iE 'killed process|out of memory' | tail -3 | base64 -w0)"
            tail -c 2400 /tmp/cargo-check.log | base64 -w0 | fold -w 800 | \
              while read -r chunk; do echo "::error title=cargo-b64::${chunk}"; done
            exit 1
          }
      - run: cargo test
      - name: cargo audit (report only)
        run: |
          cargo install cargo-audit --locked || true
          cargo audit || true

  natascha:
    needs: changes
    if: needs.changes.outputs.natascha == 'true'
    name: NATASCHA — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/natascha
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # cli + tui Requirements: test_tui.py importiert das TUI-Modul (textual).
      - run: pip install -r requirements_cli.txt -r requirements_tui.txt pytest
      - run: pytest -q

  schema-sync:
    name: NATASCHA-Schema — Python ↔ Rust synchron
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Wächter: natascha_db.py SCHEMA_SQL vs. src-tauri natascha_schema.sql
      # (E3). Stdlib-only, kein pip nötig.
      - run: python3 scripts/check_natascha_schema_sync.py
