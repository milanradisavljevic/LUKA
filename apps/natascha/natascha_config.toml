[project]
name = "NATASCHA"
description = "Normbasierte Analyse von Textproduktionen: Automatisierte Schularbeits-Correction als Hilfe-Agent"

[agent]
default = "claude"
timeout_seconds = 300

[agent.commands]
claude = "claude --print"
codex = "codex exec"
qwen = "qwen -p"

[api]
enabled = true
# Provider: anthropic | deepseek | kimi | mistral | openai | ollama
provider = "mistral"
model = "mistral-large-latest"

[paths]
input = "input"
output = "output"
rubrics = "rubrics"
feedback_data = "output/feedback_data"
schema = "feedback_schema.json"
fehlerlog = "output/fehlerlog.txt"

[defaults]
fach = "Deutsch"
schulstufe = "Oberstufe"

[database]
# SQLite-Datenbank fuer Schueler-Tracking und Historie.
# Ein Schuljahr = eine Datei. Beispiel: "natascha_2025_26.db"
#
# Gemeinsamer Pfad mit LUA (beide Apps nutzen dieselbe DB):
path = "~/lehr-suite-bridge/lehr-suite.db"
# Lokaler Pfad (Nur-NATASCHA):
# path = "natascha_schuljahr.db"

[bridge]
# Datei-Bruecke zum Lehrunterlagen-Tool (LUA). Der Heatmap-Tab schreibt hier
# pro Aufgabe ein JSON, das LUA in Step0 zu gezielten Uebungen verarbeitet.
# Leer/auskommentiert = Default ~/lehr-suite-bridge/inbox (von beiden Apps geteilt).
# inbox_dir = ""

[rubric_mapping]
"Deutsch+Oberstufe" = "srdp_deutsch_oberstufe.md"
"Deutsch+Unterstufe" = "deutsch_unterstufe.md"
"Englisch+Unterstufe" = "englisch_a2.md"
"Englisch+Oberstufe" = "srdp_englisch_b2.md"

[docx]
teacher_name = "Natascha Kordovsky"
school_name = ""
logo_path = ""

[erwartungshorizont]
# Separates LLM für EH-Generierung (leer = globale API-Config verwenden)
default_provider = ""
default_model = ""
# Für maximale Qualität z. B.:
# default_provider = "anthropic"
# default_model = "claude-opus-4-20250514"

